[project]
name = "aegis-vault"
description = "A decentralized credit protocol with self-repaying loans."
authors = []
telemetry = true
cache_dir = "./.cache"

[[project.requirements]]
contract_id = "SM3VDXK3WZZSA84XXFKAFAF15NNZX32CTSG82JFQ4.sbtc-token"

[contracts.aeusd]
path = "contracts/aeusd.clar"
clarity_version = 2
epoch = "latest"

[contracts.vault]
path = "contracts/vault.clar"
clarity_version = 2
epoch = "latest"

[contracts.oracle]
path = "contracts/oracle.clar"
clarity_version = 2
epoch = "latest"

[repl.analysis]
passes = ["check_checker"]
check_checker = { trusted_sender = false, trusted_caller = false, callee_filter = false }
